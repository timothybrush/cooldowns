name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      UV_EXCLUDE_NEWER: "3 days"
    steps:
      - uses: actions/checkout@v5

      - name: ShellCheck
        run: shellcheck cooldowns.sh

      - uses: astral-sh/setup-uv@v6

      - name: Markdown lint
        run: uv run --with mdlint mdlint check docs/index.md README.md

      - name: Validate docs
        run: uv run --with zensical zensical build
